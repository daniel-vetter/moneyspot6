<div class="dialog-content">
    <label for="simulation-name">Name:</label>
    <input #nameInput id="simulation-name" type="text" pInputText [(ngModel)]="name" style="width: 100%;" (keydown.enter)="onConfirm()" [disabled]="isSaving" />
    @if (!isEditMode) {
        <div class="sample-code-option">
            <p-checkbox [(ngModel)]="includeSampleCode" [binary]="true" inputId="include-sample-code"></p-checkbox>
            <label for="include-sample-code">Beispielcode einfügen</label>
        </div>
    }
    @if (errorMessage) {
        <p-message severity="error" [text]="errorMessage" variant="simple" size="small"></p-message>
    }
</div>
<div class="dialog-footer">
    <p-button label="Abbrechen" [text]="true" (click)="onCancel()" [disabled]="isSaving"></p-button>
    <p-button [label]="isEditMode ? 'OK' : 'Erstellen'" (click)="onConfirm()" [disabled]="!name.trim() || isSaving" [loading]="isSaving"></p-button>
</div>
