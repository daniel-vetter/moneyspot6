<div class="vertical">
    <div class="horizontal vertical-on-mobile">
        <div>
            <p-datepicker [(ngModel)]="dateRange" (ngModelChange)="update()" selectionMode="range" view="date" dateFormat="dd/mm/yy" />
        </div>
        <app-daterange-preset-selector [(range)]="dateRange" (rangeChange)="update()"></app-daterange-preset-selector>
    </div>

    @for (chart of charts; track chart.index) {
    <highcharts-chart [Highcharts]="Highcharts" [options]="chart" style="width: 100%; height: 1000px; display: block"></highcharts-chart>
    }

</div>
