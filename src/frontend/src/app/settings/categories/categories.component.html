<p-panel>
    <ng-template pTemplate="header">
        <div class="horizontal" style="width: 100%">
            <h1>Kategorien</h1>
            <div class="spacer"></div>
            <p-button label="Neue Kategorie" (onClick)="onNewCategoryClicked(undefined)" data-testid="create-category-button" />
        </div>
    </ng-template>

    @if (entries.length > 0) {
    <p-treetable [value]="entries" [scrollable]="true" [tableStyle]="{'min-width':'50rem'}">
        <ng-template #header>
            <tr>
                <th>Name</th>
                <th></th>
            </tr>
        </ng-template>
        <ng-template #body let-rowNode let-rowData="rowData">
            <tr [ttRow]="rowNode" [attr.data-testid]="'category-row-' + rowData.id">
                <td>
                    <p-treetable-toggler [rowNode]="rowNode" />
                    {{ rowData.name }}
                </td>
                <td style="text-align: right;">
                    <div class="horizontal" style="gap: 0.5rem; justify-content: flex-end;">
                        <p-button
                            icon="pi pi-plus"
                            [outlined]="true"
                            size="small"
                            (onClick)="onNewCategoryClicked(rowData.id)"
                            pTooltip="Unterkategorie hinzufügen"
                            tooltipPosition="top"
                            data-testid="add-subcategory-button">
                        </p-button>
                        <p-button
                            icon="pi pi-pencil"
                            [outlined]="true"
                            size="small"
                            (onClick)="onEditCategoryClicked(rowData.id)"
                            pTooltip="Bearbeiten"
                            tooltipPosition="top"
                            data-testid="edit-category-button">
                        </p-button>
                        <p-button
                            icon="pi pi-trash"
                            [outlined]="true"
                            severity="danger"
                            size="small"
                            (onClick)="onDeleteCategoryClicked(rowData.id)"
                            pTooltip="Löschen"
                            tooltipPosition="top"
                            data-testid="delete-category-button">
                        </p-button>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-treetable>
    } @else {
        <div style="text-align: center; padding: 2rem; opacity: 0.6;" data-testid="categories-empty-state">
            <div style="font-size: 1.2rem; margin-bottom: 0.5rem;">Keine Kategorien vorhanden</div>
            <div>Fügen Sie eine neue Kategorie hinzu, um Transaktionen zu organisieren.</div>
        </div>
    }
</p-panel>
