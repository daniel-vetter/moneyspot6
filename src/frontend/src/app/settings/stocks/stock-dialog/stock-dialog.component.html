<form style="height: 100%; padding-top: 0.5rem" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="vertical" style="height: 100%; gap: 1rem;">

        <div class="form-field">
            <div>Name:</div>
            <div style="width: 100%;">
                <input type="text" pInputText formControlName="name" autocomplete="off" style="width: 100%;" placeholder="z.B. Apple Inc." />
            </div>
            <div>
                <p-message variant="simple" size="small" severity="error" *ngIf="form.get('name')?.touched && form.get('name')?.errors?.['required']">
                    Ein Name muss angegeben werden.
                </p-message>
                <p-message variant="simple" size="small" severity="error" *ngIf="form.get('name')?.errors?.['nameAlreadyExists']">
                    Es existiert bereits eine Aktie mit diesem Namen.
                </p-message>
            </div>
        </div>

        <div class="form-field">
            <div>Symbol (optional):</div>
            <div style="width: 100%;">
                <input type="text" pInputText formControlName="symbol" autocomplete="off" style="width: 100%;" placeholder="z.B. AAPL" />
            </div>
        </div>

        <div class="spacer"></div>

        <div class="horizontal">
            <div class="spacer"></div>
            <p-button [outlined]="true" [style]="{ 'min-width': '100px' }" (click)="onCancelClicked()" label="Abbrechen"></p-button>
            <p-button type="submit" [style]="{ 'min-width': '100px' }" [disabled]="!form.valid" label="Ok"></p-button>
        </div>
    </div>
</form>
