<form style="height: 100%; padding-top: 0.5rem" [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="vertical" style="height: 100%">

        <div class="form-field">
            <div>Adresse:</div>
            <div class="" style="width: 100%;">
                <input type="text" pInputText formControlName="address" name="name" autocomplete="off" style="width: 100%;" width="100%"/>
            </div>
            <div>
                @if (form.dirty && form.get('name')?.errors?.['required']) {
                    <p-message variant="simple" size="small" severity="error">Eine Address muss angegeben werden.</p-message>
                }
                @if (form.dirty && form.get('name')?.errors?.['alreadyConfigured']) {
                    <p-message variant="simple" size="small" severity="error">Es wurde bereits eine Konfiguration für diese Mail Addresse hinzugefügt.</p-message>
                }
            </div>
        </div>

        <div style="height: 1rem;;"></div>

        <div class="spacer"></div>

        <div class="horizontal">
            <div class="spacer"></div>
            <p-button [outlined]="true" [style]="{ 'min-width': '100px' }" (click)="onCancelClicked()" label="Abbrechen"></p-button>
            <p-button type="submit" [style]="{ 'min-width': '100px' }" [disabled]="!form.valid" label="Ok"></p-button>
        </div>
    </div>
</form>
