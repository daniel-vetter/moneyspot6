<div style="position: relative;">
    @if (loading) {
        <div style="position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: var(--p-surface-0); z-index: 10;">
            <p-progressSpinner></p-progressSpinner>
        </div>
    }
    <form style="height: 100%; padding-top: 0.5rem" [formGroup]="form" (ngSubmit)="onSubmit()" [style.visibility]="loading ? 'hidden' : 'visible'">
        <div style="display: flex; flex-direction: column; gap: 1rem;">

            <div class="form-field">
                <div>Name:</div>
                <div class="" style="width: 100%;">
                    <input type="text" pInputText formControlName="name" name="name" autocomplete="off" style="width: 100%;" width="100%" autofocus data-testid="rule-name-input" />
                </div>
                <div>
                    @if (form.dirty && form.get('name')?.errors?.['required']) {
                        <p-message variant="simple" size="small" severity="error">Ein Name muss angegeben werden.</p-message>
                    }
                    @if (form.dirty && form.get('name')?.errors?.['nameAlreadyInUse']) {
                        <p-message variant="simple" size="small" severity="error">Es existiert bereits eine Regel mit
                            diesem Name.</p-message>
                    }
                </div>
            </div>

            <div>
                <div #container style="flex: 1; border: 1px solid var(--p-panel-border-color); height: 500px;" data-testid="rule-code-editor"></div>
            </div>


            <p-message [severity]="infoMessageSeverity" variant="outlined">{{ infoMessage }}</p-message>

            <div class="horizontal">
                <div class="spacer"></div>
                <p-button [outlined]="true" [style]="{ 'min-width': '100px' }" (click)="onCancelClicked()" label="Abbrechen" data-testid="rule-cancel-button"></p-button>
                <p-button type="submit" [style]="{ 'min-width': '100px' }" [disabled]="!form.valid || codeError !== undefined || codeErrorStillThinking === true" label="Ok" data-testid="rule-submit-button"></p-button>
            </div>
        </div>
    </form>
</div>
