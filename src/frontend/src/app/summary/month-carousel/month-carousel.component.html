<div class="no-indicator">
    <p-carousel [value]="months" [numVisible]="tileCount" [showNavigators]="showNavigator" [numScroll]="1" [circular]="false">
        <ng-template let-month #item>
            <div class="tile" appScrollFade>
                <p-scrollpanel [style]="{ width: '100%', height: '21rem' }">
                    <div class="tile-inner">
                        <div class="tile-header">
                            <h3>{{ getMonthName(month.month) }}</h3>
                            <div class="spacer"></div>
                            <div class="header-value" style="border-right: none; padding-right: 0">
                                <div>Gesamt</div>
                                <app-value [value]="month.stockBalance + month.accountBalance"></app-value>
                            </div>
                        </div>

                        <div style="margin-top: 1.25rem;">
                            <b>Bilanz</b>
                            <div class="key-value category-item">
                                <div>Konto</div>
                                <div><app-value [value]="month.accountBalance"></app-value></div>
                            </div>
                            <div class="key-value category-item">
                                <div>Aktien</div>
                                <div><app-value [value]="month.stockBalance"></app-value></div>
                            </div>
                            <br>
                            <b>Nach Kategorie</b>

                            @for(category of month.categories; track category.name) {
                            <div class="key-value category-item">
                                <div>{{ category.name }}</div>
                                <div><app-value [value]="category.total"></app-value></div>
                            </div>
                            }
                        </div>
                    </div>
                </p-scrollpanel>
            </div>
        </ng-template>
    </p-carousel>
</div>
