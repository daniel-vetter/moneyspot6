<div class="no-indicator">
    <p-carousel [value]="months" [numVisible]="4" [numScroll]="1" [circular]="false">
        <ng-template let-month #item>
            <div class="tile">
                <p-scrollpanel [style]="{ width: '100%', height: '20rem' }">
                    <div class="tile-inner">
                        <h3 style="margin-top: 0;">{{ getMonthName(month.month) }}</h3>

                        <div style="margin-top: 1rem; height: 15rem;">
                            <b>Bilanz</b>
                            <div class="key-value">
                                <div>Konto</div>
                                <div><app-value [value]="month.accountBalance"></app-value></div>
                            </div>
                            <div class="key-value">
                                <div>Aktien</div>
                                <div><app-value [value]="month.stockBalance"></app-value></div>
                            </div>
                            <div class="key-value">
                                <div>Gesamt</div>
                                <div><app-value [value]="month.stockBalance + month.accountBalance"></app-value></div>
                            </div>
                            <br>

                            <b>Nach Kategorie</b>

                            @for(category of month.categories; track category.name) {
                            <div class="key-value">
                                <div>{{ category.name }}</div>
                                <div><app-value [value]="category.total"></app-value></div>
                            </div>
                            }
                        </div>
                    </div>
                </p-scrollpanel>
            </div>
        </ng-template>
    </p-carousel>
</div>
