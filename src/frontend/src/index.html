<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>MoneySpot6Client</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.svg" />
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'emerald';
            var dark = theme !== 'light';
            var cl = document.documentElement.classList;
            cl.add('theme-' + theme);
            if (dark) cl.add('dark-mode');
        })();
    </script>
</head>

<body>
    <app-root></app-root>
</body>

</html>
