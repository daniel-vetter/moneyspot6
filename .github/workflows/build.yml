name: Build & Test

on:
  push:
    branches: ['**']
  schedule:
    - cron: '15 18 * * 2'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  build:
    name: Build Docker Image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t moneyspot6:${{ github.sha }} --build-arg BUILD_VERSION=${{ github.sha }} --build-arg "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" .

      - name: Save Docker image
        run: docker save moneyspot6:${{ github.sha }} -o /tmp/docker-image.tar

      - name: Cache Docker image
        uses: actions/cache/save@v5
        with:
          path: /tmp/docker-image.tar
          key: docker-image-${{ github.sha }}

  backend-test:
    name: Test Backend (${{ matrix.db }})
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        db: [Sqlite, Postgres]
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Build (Debug)
        run: dotnet build MoneySpot6.WebApp.Tests/MoneySpot6.WebApp.Tests.csproj

      - name: Install Playwright browsers
        run: pwsh MoneySpot6.WebApp.Tests/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Test
        run: dotnet test MoneySpot6.WebApp.Tests/MoneySpot6.WebApp.Tests.csproj --no-build --filter "FullyQualifiedName~${{ matrix.db }}" --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Test Results (${{ matrix.db }})
          path: src/backend/TestResults/**/*.trx
          reporter: dotnet-trx

  unit-test:
    name: Unit Tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Build (Debug)
        run: dotnet build MoneySpot6.WebApp.Tests/MoneySpot6.WebApp.Tests.csproj

      - name: Test
        run: dotnet test MoneySpot6.WebApp.Tests/MoneySpot6.WebApp.Tests.csproj --no-build --filter "FullyQualifiedName!~Sqlite&FullyQualifiedName!~Postgres" --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit Test Results
          path: src/backend/TestResults/**/*.trx
          reporter: dotnet-trx

  e2e-test:
    name: E2E Tests
    if: github.event_name == 'push'
    needs: [build]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Restore Docker image
        uses: actions/cache/restore@v5
        with:
          path: /tmp/docker-image.tar
          key: docker-image-${{ github.sha }}

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Build E2E tests
        run: dotnet build MoneySpot6.E2eTests/MoneySpot6.E2eTests.csproj

      - name: Install Playwright browsers
        run: pwsh MoneySpot6.E2eTests/bin/Debug/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run E2E tests
        run: dotnet test MoneySpot6.E2eTests/MoneySpot6.E2eTests.csproj --no-build --logger "trx;LogFileName=e2e-results.trx" --results-directory TestResults
        env:
          E2E_PREBUILT_IMAGE: moneyspot6:${{ github.sha }}

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: E2E Test Results
          path: src/backend/TestResults/**/*.trx
          reporter: dotnet-trx

  push:
    name: Push Docker Image
    needs: [build, unit-test, backend-test, e2e-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Restore Docker image
        uses: actions/cache/restore@v5
        with:
          path: /tmp/docker-image.tar
          key: docker-image-${{ github.sha }}

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
          fi

      - name: Tag and push
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          GHCR="ghcr.io/${{ github.repository }}"
          DH="dvetter/moneyspot6"
          docker tag moneyspot6:${{ github.sha }} $GHCR:$TAG
          docker tag moneyspot6:${{ github.sha }} $DH:$TAG
          docker push $GHCR:$TAG
          docker push $DH:$TAG
          echo "### Pushed \`$DH:$TAG\` and \`$GHCR:$TAG\`" >> $GITHUB_STEP_SUMMARY

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: csharp
            build-mode: none
          - language: java-kotlin
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: 21

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build hbci-adapter
        if: matrix.language == 'java-kotlin'
        working-directory: src/hbci-adapter
        run: ./gradlew --no-daemon build -x test

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
