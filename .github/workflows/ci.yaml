name: ci

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: dvetter/moneyspot6:latest , dvetter/moneyspot6:${{ github.sha }}
      - name: Extracting files from docker image
        run: |
          mkdir -p ./build
          TEMPCONTAINER=$(docker create dvetter/moneyspot6:$GITHUB_SHA)
          docker cp $TEMPCONTAINER:/app/. ./build
      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: appfiles
          path: ./build


  deploy:
    needs: build
    runs-on: [self-hosted, moneyspot, prod]
    steps:
      - name: Download a single artifact
        uses: actions/download-artifact@v4
        with:
          name: appfiles
          path: ./appfiles
      - uses: actions/checkout@v4
        with:
          sparse-checkout: src/deployment/install.sh
      - name: Updating deployment
        run: |
          chmod +x src/deployment/install.sh
          src/deployment/install.sh moneyspot prod ./appfiles MoneySpot6.WebApp.dll

          